<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .mobile-link {
      display: none;
      padding: 16px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <script>
    if (window.innerWidth <= 768) {
      
      document.write('<a class="mobile-link" href="test.pdf" style="display:block">Biomuhandislik va nanotexnologiya</a>');
    } else {
     
      document.write('<iframe src="test.pdf"></iframe>');
    }
  </script>

</body>
</html>
