<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 90%;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.45);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-btn svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📘</div>
    <div class="title">Imtixon yakunlandi</div>

</html>
